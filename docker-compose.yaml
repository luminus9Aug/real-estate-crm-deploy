# =============================================================
# Real-Estate CRM — Docker Compose (Local Dev / Staging)
# Services: postgres · redis · backend · frontend
#
# Usage:
#   Start all:          docker compose up -d
#   Rebuild all:        docker compose up -d --build
#   Rebuild one:        docker compose up -d --build backend
#   Logs (follow):      docker compose logs -f backend
#   Stop & remove:      docker compose down
#   Full reset (data):  docker compose down -v
# =============================================================

name: real-estate-crm

# ─────────────────────────────────────────────────────────────
# Shared network — all services communicate by service name
# ─────────────────────────────────────────────────────────────
networks:
  crm_net:
    driver: bridge

# ─────────────────────────────────────────────────────────────
# Named volumes — persist data across container restarts
# ─────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

# ─────────────────────────────────────────────────────────────
# Reusable health-check defaults (YAML anchor)
# ─────────────────────────────────────────────────────────────
x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 20s

services:

  # ───────────────────────────────────────────────────────────
  # 1. PostgreSQL 16
  # ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: propertysales
      POSTGRES_PASSWORD: propertysales
      POSTGRES_DB: propertysales_db
      # Tuning: shared_buffers 256MB, work_mem 16MB, max_connections 100
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"

    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init SQL: enable pg_trgm & pgcrypto on first boot
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - crm_net
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U propertysales -d propertysales_db"]

  # ───────────────────────────────────────────────────────────
  # 1.5. Postgres Automated Backups
  # ───────────────────────────────────────────────────────────
  pgbackups:
    image: prodrigestivill/postgres-backup-local
    container_name: crm_pgbackups
    restart: unless-stopped
    user: postgres:postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: propertysales_db
      POSTGRES_USER: propertysales
      POSTGRES_PASSWORD: propertysales
      # Cron schedule (Run every 12 hours)
      SCHEDULE: "@every 12h"
      # Retention policy
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 1
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./infra/postgres/backups:/backups
    networks:
      - crm_net
    depends_on:
      postgres:
        condition: service_healthy

  # ───────────────────────────────────────────────────────────
  # 2. Redis 7 — cache + BullMQ queues + Socket.io adapter
  # ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    # Persistence: AOF (appendonly) for durability
    # maxmemory 256mb with allkeys-lru eviction for cache efficiency
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory 256mb
        --maxmemory-policy noeviction
        --save 60 1000
        --loglevel warning
    volumes:
      - redisdata:/data
    networks:
      - crm_net
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]

  # ───────────────────────────────────────────────────────────
  # 3. Backend — NestJS (pnpm + Prisma)
  # ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      # Enable BuildKit cache (requires DOCKER_BUILDKIT=1 or Docker 23+)
      cache_from:
        - type=local,src=/tmp/.buildx-cache-backend
    container_name: crm_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3001
    networks:
      - crm_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      start_period: 40s

  # ───────────────────────────────────────────────────────────
  # 4. Frontend — Next.js 14 (standalone output)
  # ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* vars baked at build time
      args:
        INTERNAL_API_URL: http://backend:3001
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-"PropertySales OS"}
        NEXT_PUBLIC_MAP_PROVIDER: ${NEXT_PUBLIC_MAP_PROVIDER:-leaflet-osm}
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME:-Root}
        NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET:-System}
      cache_from:
        - type=local,src=/tmp/.buildx-cache-frontend
    container_name: crm_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - INTERNAL_API_URL=http://backend:3001
      - PORT=3000
    networks:
      - crm_net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      start_period: 30s
